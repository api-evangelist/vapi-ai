    ModelCost:
      type: object
      properties:
        type:
          type: string
          description: This is the type of cost, always 'model' for this class.
          enum:
          - model
        model:
          type: object
          description: 'This is the model that was used during the call.


            This matches one of the following:

            - `call.assistant.model`,

            - `call.assistantId->model`,

            - `call.squad[n].assistant.model`,

            - `call.squad[n].assistantId->model`,

            - `call.squadId->[n].assistant.model`,

            - `call.squadId->[n].assistantId->model`.'
        promptTokens:
          type: number
          description: This is the number of prompt tokens used in the call. These should be total prompt tokens used in the
            call for single assistant calls, while squad calls will have multiple model costs one for each assistant that
            was used.
        completionTokens:
          type: number
          description: This is the number of completion tokens generated in the call. These should be total completion tokens
            used in the call for single assistant calls, while squad calls will have multiple model costs one for each assistant
            that was used.
        cachedPromptTokens:
          type: number
          description: This is the number of cached prompt tokens used in the call. This is only applicable to certain providers
            (e.g., OpenAI, Azure OpenAI) that support prompt caching. Cached tokens are billed at a discounted rate.
        cost:
          type: number
          description: This is the cost of the component in USD.
      required:
      - type
      - model
      - promptTokens
      - completionTokens
      - cost
    MonitorPlan:
      type: object
      properties:
        listenEnabled:
          type: boolean
          description: 'This determines whether the assistant''s calls allow live listening. Defaults to true.


            Fetch `call.monitor.listenUrl` to get the live listening URL.


            @default true'
          example: false
        listenAuthenticationEnabled:
          type: boolean
          description: 'This enables authentication on the `call.monitor.listenUrl`.


            If `listenAuthenticationEnabled` is `true`, the `call.monitor.listenUrl` will require an `Authorization: Bearer
            <vapi-public-api-key>` header.


            @default false'
          example: false
        controlEnabled:
          type: boolean
          description: 'This determines whether the assistant''s calls allow live control. Defaults to true.


            Fetch `call.monitor.controlUrl` to get the live control URL.


            To use, send any control message via a POST request to `call.monitor.controlUrl`. Here are the types of controls
            supported: https://docs.vapi.ai/api-reference/messages/client-inbound-message


            @default true'
          example: false
        controlAuthenticationEnabled:
          type: boolean
          description: 'This enables authentication on the `call.monitor.controlUrl`.


            If `controlAuthenticationEnabled` is `true`, the `call.monitor.controlUrl` will require an `Authorization: Bearer
            <vapi-public-api-key>` header.


            @default false'
          example: false
        monitorIds:
          description: 'This the set of monitor ids that are attached to the assistant.

            The source of truth for the monitor ids is the assistant_monitor join table.

            This field can be used for transient assistants and to update assistants with new monitor ids.


            @default []'
          example:
          - 123e4567-e89b-12d3-a456-426614174000
          type: array
          items:
            type: string
