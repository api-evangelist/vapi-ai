            to model.


            Default `false` because the model is usually are good at understanding the user''s emotion from text.


            @default false'
        numFastTurns:
          type: number
          description: 'This sets how many turns at the start of the conversation to use a smaller, faster model from the
            same provider before switching to the primary model. Example, gpt-3.5-turbo if provider is openai.


            Default is 0.


            @default 0'
          minimum: 0
      required:
      - model
      - provider
    Chat:
      type: object
      properties:
        assistantId:
          type: string
          description: This is the assistant that will be used for the chat. To use an existing assistant, use `assistantId`
            instead.
        assistant:
          description: This is the assistant that will be used for the chat. To use an existing assistant, use `assistantId`
            instead.
          allOf:
          - $ref: '#/components/schemas/CreateAssistantDTO'
        assistantOverrides:
          description: 'These are the variable values that will be used to replace template variables in the assistant messages.

            Only variable substitution is supported in chat contexts - other assistant properties cannot be overridden.'
          allOf:
          - $ref: '#/components/schemas/AssistantOverrides'
        squadId:
          type: string
          description: This is the squad that will be used for the chat. To use a transient squad, use `squad` instead.
        squad:
          description: This is the squad that will be used for the chat. To use an existing squad, use `squadId` instead.
          allOf:
          - $ref: '#/components/schemas/CreateSquadDTO'
        name:
          type: string
          description: This is the name of the chat. This is just for your own reference.
          maxLength: 40
        sessionId:
          type: string
          description: 'This is the ID of the session that will be used for the chat.

            Mutually exclusive with previousChatId.'
        input:
          description: 'This is the input text for the chat.

            Can be a string or an array of chat messages.'
          oneOf:
          - type: string
            title: String
          - type: array
            items:
              oneOf:
              - $ref: '#/components/schemas/SystemMessage'
                title: SystemMessage
              - $ref: '#/components/schemas/UserMessage'
                title: UserMessage
              - $ref: '#/components/schemas/AssistantMessage'
                title: AssistantMessage
              - $ref: '#/components/schemas/ToolMessage'
                title: ToolMessage
              - $ref: '#/components/schemas/DeveloperMessage'
                title: DeveloperMessage
            title: MessageArray
          examples:
          - Hello, how can you help me?
          - - role: user
              content: Hello, how can you help me?
        stream:
          type: boolean
          description: 'This is a flag that determines whether the response should be streamed.

            When true, the response will be sent as chunks of text.'
          default: false
        previousChatId:
          type: string
          description: 'This is the ID of the chat that will be used as context for the new chat.

            The messages from the previous chat will be used as context.

            Mutually exclusive with sessionId.'
        id:
          type: string
          description: This is the unique identifier for the chat.
        orgId:
          type: string
          description: This is the unique identifier for the org that this chat belongs to.
        messages:
          type: array
          description: 'This is an array of messages used as context for the chat.

            Used to provide message history for multi-turn conversations.'
          items:
            oneOf:
            - $ref: '#/components/schemas/SystemMessage'
              title: SystemMessage
            - $ref: '#/components/schemas/UserMessage'
              title: UserMessage
            - $ref: '#/components/schemas/AssistantMessage'
              title: AssistantMessage
            - $ref: '#/components/schemas/ToolMessage'
              title: ToolMessage
            - $ref: '#/components/schemas/DeveloperMessage'
              title: DeveloperMessage
        output:
          type: array
          description: This is the output messages generated by the system in response to the input.
          items:
            oneOf:
            - $ref: '#/components/schemas/SystemMessage'
              title: SystemMessage
            - $ref: '#/components/schemas/UserMessage'
              title: UserMessage
            - $ref: '#/components/schemas/AssistantMessage'
              title: AssistantMessage
            - $ref: '#/components/schemas/ToolMessage'
              title: ToolMessage
            - $ref: '#/components/schemas/DeveloperMessage'
              title: DeveloperMessage
        createdAt:
          format: date-time
          type: string
          description: This is the ISO 8601 date-time string of when the chat was created.
        updatedAt:
          format: date-time
          type: string
          description: This is the ISO 8601 date-time string of when the chat was last updated.
        costs:
          type: array
          description: These are the costs of individual components of the chat in USD.
          items:
            oneOf:
            - $ref: '#/components/schemas/ModelCost'
              title: ModelCost
            - $ref: '#/components/schemas/ChatCost'
              title: ChatCost
        cost:
          type: number
          description: This is the cost of the chat in USD.
      required:
      - id
      - orgId
      - createdAt
      - updatedAt
    ChatCost:
      type: object
      properties:
        type:
          type: string
          description: This is the type of cost, always 'chat' for this class.
          enum:
          - chat
        cost:
          type: number
          description: This is the cost of the component in USD.
      required:
      - type
      - cost
    ChatPaginatedResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/Chat'
        metadata:
          $ref: '#/components/schemas/PaginationMeta'
      required:
      - results
      - metadata
    ChunkPlan:
      type: object
      properties:
        enabled:
          type: boolean
          description: 'This determines whether the model output is chunked before being sent to the voice provider. Default
            `true`.


            Usage:

            - To rely on the voice provider''s audio generation logic, set this to `false`.

            - If seeing issues with quality, set this to `true`.


            If disabled, Vapi-provided audio control tokens like <flush /> will not work.


            @default true'
          example: true
        minCharacters:
          type: number
          description: 'This is the minimum number of characters in a chunk.


            Usage:

            - To increase quality, set this to a higher value.

            - To decrease latency, set this to a lower value.


            @default 30'
          minimum: 1
          maximum: 80
          example: 30
        punctuationBoundaries:
          type: array
          description: 'These are the punctuations that are considered valid boundaries for a chunk to be created.


            Usage:

            - To increase quality, constrain to fewer boundaries.

            - To decrease latency, enable all.


            Default is automatically set to balance the trade-off between quality and latency based on the provider.'
          enum:
          - 。
          - ，
          - .
          - '!'
          - '?'
          - ;
          - )
          - ،
          - ۔
          - ।
          - ॥
          - '|'
          - '||'
          - ','
          - ':'
          example:
          - 。
          - ，
          - .
          - '!'
          - '?'
          - ;
          - ،
          - ۔
          - ।
          - ॥
          - '|'
          - '||'
          - ','
          - ':'
          items:
            type: string
            enum:
            - 。
            - ，
            - .
            - '!'
            - '?'
            - ;
            - )
            - ،
            - ۔
            - ।
            - ॥
            - '|'
            - '||'
            - ','
            - ':'
        formatPlan:
          description: This is the plan for formatting the chunk before it is sent to the voice provider.
          allOf:
          - $ref: '#/components/schemas/FormatPlan'
    CloudflareR2BucketPlan:
      type: object
      properties:
        accessKeyId:
          type: string
          description: Cloudflare R2 Access key ID.
        secretAccessKey:
          type: string
          description: Cloudflare R2 access key secret. This is not returned in the API.
        url:
          type: string
          description: Cloudflare R2 base url.
        name:
          type: string
          description: This is the name of the bucket.
        path:
          type: string
          description: 'This is the path where call artifacts will be stored.


            Usage:

            - To store call artifacts in a specific folder, set this to the full path. Eg. "/folder-name1/folder-name2".

            - To store call artifacts in the root of the bucket, leave this blank.


            @default "/"'
      required:
      - name
    CodeToolEnvironmentVariable:
      type: object
      properties:
        name:
          type: string
          description: Name of the environment variable
          maxLength: 64
          pattern: /^[A-Z][A-Z0-9_]*$/
          example: API_KEY
        value:
          type: string
          description: Value of the environment variable. Supports Liquid templates.
          maxLength: 10000
          example: '{{apiKey}}'
      required:
      - name
      - value
    ComplianceOverride:
      type: object
      properties:
        forceStoreOnHipaaEnabled:
          type: boolean
          description: Force storage for this output under HIPAA. Only enable if output contains no sensitive data.
          example: false
    CompliancePlan:
      type: object
      properties:
        hipaaEnabled:
          type: boolean
          description: When this is enabled, logs, recordings, and transcriptions will be stored in HIPAA-compliant storage.
            Defaults to false. Only HIPAA-compliant providers will be available for LLM, Voice, and Transcriber respectively.
            This setting is only honored if the organization is on an Enterprise subscription or has purchased the HIPAA add-on.
        pciEnabled:
          type: boolean
          description: 'When this is enabled, the user will be restricted to use PCI-compliant providers, and no logs or transcripts
            are stored.

            At the end of the call, you will receive an end-of-call-report message to store on your server. Defaults to false.'
          example:
            pciEnabled: false
        securityFilterPlan:
          description: This is the security filter plan for the assistant. It allows filtering of transcripts for security
            threats before sending to LLM.
          allOf:
          - $ref: '#/components/schemas/SecurityFilterPlan'
        recordingConsentPlan:
          oneOf:
          - $ref: '#/components/schemas/RecordingConsentPlanStayOnLine'
            title: RecordingConsentStayOnLinePlan
          - $ref: '#/components/schemas/RecordingConsentPlanVerbal'
            title: RecordingConsentPlanVerbal
          discriminator:
            propertyName: type
            mapping:
              stay-on-line: '#/components/schemas/RecordingConsentPlanStayOnLine'
              verbal: '#/components/schemas/RecordingConsentPlanVerbal'
