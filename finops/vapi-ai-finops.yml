specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Vapi
providerId: vapi-ai
created: '2026-05-24'
modified: '2026-05-24'
reconciled: true
tags:
  - FinOps
  - Cost Management
  - FOCUS
  - Voice AI
  - Tokens
  - Telephony
description: FOCUS-aligned FinOps definition for the Vapi voice AI platform. Vapi's billing surface is
  per-minute orchestration plus pass-through model / transcriber / voice / telephony provider costs.
sources:
  - https://vapi.ai/pricing
  - https://docs.vapi.ai
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Vapi
serviceCategory: AI and Machine Learning
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  primaryUnit: minute
  secondaryUnits:
    - line
    - message
    - subscription
focusColumns:
  ServiceName: Vapi
  ServiceCategory: AI and Machine Learning
  ProviderName: Vapi
  PublisherName: Vapi
  InvoiceIssuerName: Vapi
  PricingCategory: Usage-Based
  PricingUnit: minute
  BillingCurrency: USD
meters:
  - name: call_minutes
    unit: minute
    aggregation: sum
    dimensions:
      - assistant_id
      - phone_number_id
      - squad_id
      - call_direction
      - end_reason
  - name: concurrent_call_lines
    unit: line
    aggregation: max
    dimensions:
      - org_id
  - name: sms_chat_messages
    unit: message
    aggregation: sum
    dimensions:
      - assistant_id
  - name: model_cost_pass_through
    unit: usd
    aggregation: sum
    dimensions:
      - model_provider
      - model_name
  - name: transcriber_cost_pass_through
    unit: usd
    aggregation: sum
    dimensions:
      - transcriber_provider
  - name: voice_cost_pass_through
    unit: usd
    aggregation: sum
    dimensions:
      - voice_provider
  - name: telephony_cost_pass_through
    unit: usd
    aggregation: sum
    dimensions:
      - phone_provider
discountModels:
  - name: Bring Your Own Key (BYOK)
    discount: Pay providers at cost; Vapi charges zero markup on model/transcriber/voice when BYOK
  - name: Scale Plan Volume
    discount: Custom volume-based per-minute pricing on annual contract
unitEconomics:
  - name: Vapi orchestration cost per call-minute
    metric: orchestration_cost / call_minutes
    target: $0.05
  - name: Effective cost per call
    metric: (orchestration + model + transcriber + voice + telephony) / call_count
    target: model dependent
  - name: BYOK savings
    metric: pass_through_cost - byok_cost
    target: maximize
principles:
  - name: Visibility
    description: Use the Analytics API to surface per-assistant and per-time-bucket cost in near real time.
  - name: Allocation
    description: Tag calls with assistant_id, phone_number_id, and metadata for chargeback/showback.
  - name: Optimization
    description: BYOK for stable workloads, smaller models for low-complexity calls, tune transcriber/voice
      mix per use case, watch concurrency caps to avoid unnecessary line purchases.
  - name: Accountability
    description: Set per-assistant cost guardrails and use end-reason analytics to surface unproductive
      call patterns.
