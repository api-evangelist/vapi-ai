naftiko: 1.0.0-alpha2
info:
  label: Vapi Chats API — Chats
  description: "Vapi Chats API — Chats. 5 operations. Self-contained Naftiko capability covering the Vapi Chats business surface."
  tags:
  - Vapi
  - Chats
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    VAPI_API_KEY: VAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: chats-chats
    baseUri: https://api.vapi.ai
    description: Vapi Chats API business capability. Self-contained, no shared references.
    resources:
    - name: chat
      path: /chat
      operations:
      - name: chatcontrollerlistchats
        method: GET
        description: "Vapi List Chats"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: string
          description: "This is the unique identifier for the chat to filter by."
          required: false
        - name: assistantId
          in: query
          type: string
          description: "This is the unique identifier for the assistant that will be used for the chat."
          required: false
        - name: assistantIdAny
          in: query
          type: string
          description: "Filter by multiple assistant IDs. Provide as comma-separated values."
          required: false
        - name: squadId
          in: query
          type: string
          description: "This is the unique identifier for the squad that will be used for the chat."
          required: false
        - name: sessionId
          in: query
          type: string
          description: "This is the unique identifier for the session that will be used for the chat."
          required: false
        - name: previousChatId
          in: query
          type: string
          description: "This is the unique identifier for the previous chat to filter by."
          required: false
        - name: page
          in: query
          type: string
          description: "This is the page number to return. Defaults to 1."
          required: false
        - name: sortOrder
          in: query
          type: string
          description: "This is the sort order for pagination. Defaults to 'DESC'."
          required: false
        - name: sortBy
          in: query
          type: string
          description: "This is the column to sort by. Defaults to 'createdAt'."
          required: false
        - name: limit
          in: query
          type: string
          description: "This is the maximum number of items to return. Defaults to 100."
          required: false
        - name: createdAtGt
          in: query
          type: string
          description: "This will return items where the createdAt is greater than the specified value."
          required: false
        - name: createdAtLt
          in: query
          type: string
          description: "This will return items where the createdAt is less than the specified value."
          required: false
        - name: createdAtGe
          in: query
          type: string
          description: "This will return items where the createdAt is greater than or equal to the specified value."
          required: false
        - name: createdAtLe
          in: query
          type: string
          description: "This will return items where the createdAt is less than or equal to the specified value."
          required: false
        - name: updatedAtGt
          in: query
          type: string
          description: "This will return items where the updatedAt is greater than the specified value."
          required: false
        - name: updatedAtLt
          in: query
          type: string
          description: "This will return items where the updatedAt is less than the specified value."
          required: false
        - name: updatedAtGe
          in: query
          type: string
          description: "This will return items where the updatedAt is greater than or equal to the specified value."
          required: false
        - name: updatedAtLe
          in: query
          type: string
          description: "This will return items where the updatedAt is less than or equal to the specified value."
          required: false
      - name: chatcontrollercreatechat
        method: POST
        description: "Vapi Create Chat"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: chatcontrollergetchat
        method: GET
        description: "Vapi Get Chat"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: "Path parameter id"
          required: true
      - name: chatcontrollerdeletechat
        method: DELETE
        description: "Vapi Delete Chat"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: "Path parameter id"
          required: true
    - name: chat-responses
      path: /chat/responses
      operations:
      - name: chatcontrollercreateopenaichat
        method: POST
        description: "Vapi Create Chat (OpenAI Compatible)"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      key: Authorization
      value: 'Bearer {{env.VAPI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: chats-chats-rest
    port: 8080
    description: REST adapter for Vapi Chats. One resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/chat
      name: chat
      description: REST surface for chat.
      operations:
      - method: GET
        name: chatcontrollerlistchats
        description: "Vapi List Chats"
        call: chats-chats.chatcontrollerlistchats
        with:
          id: rest.id
          assistantId: rest.assistantId
          assistantIdAny: rest.assistantIdAny
          squadId: rest.squadId
          sessionId: rest.sessionId
          previousChatId: rest.previousChatId
          page: rest.page
          sortOrder: rest.sortOrder
          sortBy: rest.sortBy
          limit: rest.limit
          createdAtGt: rest.createdAtGt
          createdAtLt: rest.createdAtLt
          createdAtGe: rest.createdAtGe
          createdAtLe: rest.createdAtLe
          updatedAtGt: rest.updatedAtGt
          updatedAtLt: rest.updatedAtLt
          updatedAtGe: rest.updatedAtGe
          updatedAtLe: rest.updatedAtLe
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: chatcontrollercreatechat
        description: "Vapi Create Chat"
        call: chats-chats.chatcontrollercreatechat
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: chatcontrollergetchat
        description: "Vapi Get Chat"
        call: chats-chats.chatcontrollergetchat
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: chatcontrollerdeletechat
        description: "Vapi Delete Chat"
        call: chats-chats.chatcontrollerdeletechat
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/chat/responses
      name: chat-responses
      description: REST surface for chat-responses.
      operations:
      - method: POST
        name: chatcontrollercreateopenaichat
        description: "Vapi Create Chat (OpenAI Compatible)"
        call: chats-chats.chatcontrollercreateopenaichat
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: chats-chats-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vapi Chats. One tool per consumed operation.
    tools:
    - name: vapi-chatcontrollerlistchats
      description: "Vapi List Chats"
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: chats-chats.chatcontrollerlistchats
      with:
        id: tools.id
        assistantId: tools.assistantId
        assistantIdAny: tools.assistantIdAny
        squadId: tools.squadId
        sessionId: tools.sessionId
        previousChatId: tools.previousChatId
        page: tools.page
        sortOrder: tools.sortOrder
        sortBy: tools.sortBy
        limit: tools.limit
        createdAtGt: tools.createdAtGt
        createdAtLt: tools.createdAtLt
        createdAtGe: tools.createdAtGe
        createdAtLe: tools.createdAtLe
        updatedAtGt: tools.updatedAtGt
        updatedAtLt: tools.updatedAtLt
        updatedAtGe: tools.updatedAtGe
        updatedAtLe: tools.updatedAtLe
      outputParameters:
      - type: object
        mapping: $.
    - name: vapi-chatcontrollercreatechat
      description: "Vapi Create Chat"
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: chats-chats.chatcontrollercreatechat
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: vapi-chatcontrollergetchat
      description: "Vapi Get Chat"
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: chats-chats.chatcontrollergetchat
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: vapi-chatcontrollerdeletechat
      description: "Vapi Delete Chat"
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: chats-chats.chatcontrollerdeletechat
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: vapi-chatcontrollercreateopenaichat
      description: "Vapi Create Chat (OpenAI Compatible)"
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: chats-chats.chatcontrollercreateopenaichat
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
