notes: >-
  First-party client library surface for Vapi. Server SDKs (TypeScript, Python, Ruby, Go, C#, PHP)
  are Fern-generated from the OpenAPI. Client/real-time SDKs (Web, React, React Native, iOS, HTML
  script tag) start Vapi calls directly in the app. The CLI binary is also distributed as a bash/
  PowerShell installer and a ghcr.io/vapiai/cli Docker image (see cli/vapi-ai-cli.yml).
